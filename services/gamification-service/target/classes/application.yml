server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful
  max-http-request-header-size: 16KB

spring:
  application:
    name: gamification-service
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5436/fraudcell_gamification}
    username: ${SPRING_DATASOURCE_USERNAME:gamification_app}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: 3000
  flyway:
    enabled: true
    url: ${SPRING_FLYWAY_URL:${spring.datasource.url}}
    user: ${SPRING_FLYWAY_USER:gamification_migrator}
    password: ${SPRING_FLYWAY_PASSWORD:change-me}
    clean-disabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      username: ${SPRING_DATA_REDIS_USERNAME:gamification}
      password: ${SPRING_DATA_REDIS_PASSWORD:change-me}
      timeout: 500ms
      connect-timeout: 500ms
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:gamification_service}
    password: ${SPRING_RABBITMQ_PASSWORD:change-me}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
        prefetch: 20
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER:https://identity.fraudcell.local}
          jwk-set-uri: ${JWKS_URI:http://identity-service:8081/.well-known/jwks.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","service":"gamification-service","request_id":"%X{request_id:-}","message":"%replace(%m){''[\r\n]'','' ''}"}%n'
