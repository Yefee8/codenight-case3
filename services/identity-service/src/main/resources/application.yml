server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful
  max-http-request-header-size: 16KB

spring:
  application:
    name: identity-service
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/fraudcell_identity}
    username: ${SPRING_DATASOURCE_USERNAME:identity_app}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: 3000
  flyway:
    enabled: true
    url: ${SPRING_FLYWAY_URL:${spring.datasource.url}}
    user: ${SPRING_FLYWAY_USER:identity_migrator}
    password: ${SPRING_FLYWAY_PASSWORD:change-me}
    clean-disabled: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:identity_service}
    password: ${SPRING_RABBITMQ_PASSWORD:change-me}
    publisher-confirm-type: correlated
    publisher-returns: true
    connection-timeout: 3s

fraudcell:
  jwt:
    issuer: ${JWT_ISSUER:https://identity.fraudcell.local}
    audience: ${JWT_AUDIENCE:fraudcell-api}
    key-id: ${JWT_KEY_ID:fraudcell-local-2026}
    access-minutes: 15
    refresh-days: 7
  demo:
    enabled: ${DEMO_MODE:false}
    otp-code: ${DEMO_OTP_CODE:1234}
  cookie-secure: ${COOKIE_SECURE:false}

management:
  endpoints.web.exposure.include: health,info,prometheus
  endpoint.health:
    probes.enabled: true
    show-details: never

logging:
  level.root: ${LOG_LEVEL:INFO}
  pattern.console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","service":"identity-service","request_id":"%X{request_id:-}","message":"%replace(%m){''[\r\n]'','' ''}"}%n'
