events {}

http {
    upstream identity_service { server identity-service:8000; }
    upstream transaction_service { server transaction-service:8000; }
    upstream ai_service { server ai-service:8000; }
    upstream gamification_service { server gamification-service:8000; }

    server {
        listen 80;
        client_max_body_size 64k;

        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        location = /health/identity { proxy_pass http://identity_service/health; }
        location = /health/transaction { proxy_pass http://transaction_service/health; }
        location = /health/ai { proxy_pass http://ai_service/health; }
        location = /health/gamification { proxy_pass http://gamification_service/health; }

        location ^~ /api/v1/auth { proxy_pass http://identity_service; }
        location ^~ /api/v1/users { proxy_pass http://identity_service; }
        location ^~ /api/v1/staff { proxy_pass http://identity_service; }
        location ^~ /api/v1/admin { proxy_pass http://identity_service; }

        location ^~ /api/v1/transactions { proxy_pass http://transaction_service; }
        location ^~ /api/v1/cases { proxy_pass http://transaction_service; }
        location ^~ /api/v1/dashboard { proxy_pass http://transaction_service; }

        location ^~ /api/v1/ai { proxy_pass http://ai_service; }
        location ^~ /api/v1/game { proxy_pass http://gamification_service; }

        location / {
            default_type application/json;
            return 404 '{"success":false,"data":null,"error":"Route not found"}';
        }
    }
}
