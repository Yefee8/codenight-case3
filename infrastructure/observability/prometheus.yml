global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: fraudcell
    environment: compose

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8080"]
  - job_name: identity-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["identity-service:8081"]
  - job_name: transaction-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["transaction-service:8082"]
  - job_name: ai-service
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-service:8000"]
  - job_name: gamification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gamification-service:8083"]

