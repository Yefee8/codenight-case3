name: CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'BackEnd/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'BackEnd/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  backend:
    name: Build + E2E tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BackEnd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build compose stack
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for gateway
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "gateway ready"; exit 0
            fi
            sleep 2
          done
          echo "gateway did not become ready"; docker compose logs; exit 1

      - name: Run E2E tests
        env:
          BASE: http://localhost:8080/api/v1
        run: node --test --test-reporter=spec tests/e2e.test.js

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  npm-audit:
    name: npm audit (high severity)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, identity-service, transaction-service, ai-service, gamification-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install (no scripts)
        working-directory: BackEnd/${{ matrix.service }}
        run: npm install --omit=dev --ignore-scripts
      - name: Audit
        working-directory: BackEnd/${{ matrix.service }}
        run: npm audit --omit=dev --audit-level=high || true
